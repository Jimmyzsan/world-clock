<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>World Clock</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111418;
      --panel: #1b2027;
      --text: #f4f6f8;
      --muted: #9aa4af;
      --line: #2b333d;
      --accent: #73d2de;
      font-family: "Segoe UI", Arial, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 28px;
    }

    main {
      width: min(920px, 100%);
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 650;
      letter-spacing: 0;
    }

    .local-date {
      color: var(--muted);
      font-size: 15px;
      text-align: right;
      white-space: nowrap;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 12px;
    }

    .clock {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 18px;
      min-height: 132px;
      display: grid;
      align-content: space-between;
    }

    .city {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      color: var(--muted);
      font-size: 15px;
    }

    .city strong {
      color: var(--text);
      font-size: 17px;
      font-weight: 600;
    }

    .time {
      margin-top: 16px;
      font-size: clamp(34px, 7vw, 54px);
      line-height: 1;
      font-variant-numeric: tabular-nums;
      letter-spacing: 0;
    }

    .date {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .daytime {
      color: var(--accent);
      font-size: 13px;
      margin-top: 8px;
    }

    @media (max-width: 560px) {
      body { padding: 18px; }
      header {
        display: block;
      }
      .local-date {
        margin-top: 8px;
        text-align: left;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>World Clock</h1>
      <div class="local-date" id="localDate"></div>
    </header>
    <section class="grid" id="clocks" aria-label="World clocks"></section>
  </main>

  <script>
    const zones = [
      { city: "London", label: "UK", timeZone: "Europe/London" },
      { city: "New York", label: "US Eastern", timeZone: "America/New_York" },
      { city: "Los Angeles", label: "US Pacific", timeZone: "America/Los_Angeles" },
      { city: "Tokyo", label: "Japan", timeZone: "Asia/Tokyo" },
      { city: "Shanghai", label: "China", timeZone: "Asia/Shanghai" },
      { city: "Sydney", label: "Australia", timeZone: "Australia/Sydney" }
    ];

    const clocks = document.getElementById("clocks");
    const localDate = document.getElementById("localDate");

    zones.forEach((zone, index) => {
      const card = document.createElement("article");
      card.className = "clock";
      card.innerHTML = `
        <div class="city">
          <strong>${zone.city}</strong>
          <span>${zone.label}</span>
        </div>
        <div>
          <div class="time" id="time-${index}"></div>
          <div class="date" id="date-${index}"></div>
          <div class="daytime" id="daytime-${index}"></div>
        </div>
      `;
      clocks.appendChild(card);
    });

    function formatInZone(date, timeZone, options) {
      return new Intl.DateTimeFormat("en-US", { timeZone, ...options }).format(date);
    }

    function update() {
      const now = new Date();
      localDate.textContent = new Intl.DateTimeFormat("zh-CN", {
        weekday: "long",
        year: "numeric",
        month: "long",
        day: "numeric",
        hour: "2-digit",
        minute: "2-digit"
      }).format(now);

      zones.forEach((zone, index) => {
        const hourText = formatInZone(now, zone.timeZone, {
          hour: "2-digit",
          hour12: false
        });
        const hour = Number(hourText);
        const status = hour >= 6 && hour < 12
          ? "Morning"
          : hour >= 12 && hour < 18
            ? "Afternoon"
            : hour >= 18 && hour < 22
              ? "Evening"
              : "Night";

        document.getElementById(`time-${index}`).textContent = formatInZone(now, zone.timeZone, {
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
          hour12: false
        });
        document.getElementById(`date-${index}`).textContent = formatInZone(now, zone.timeZone, {
          weekday: "short",
          month: "short",
          day: "numeric"
        });
        document.getElementById(`daytime-${index}`).textContent = status;
      });
    }

    update();
    setInterval(update, 1000);
  </script>
</body>
</html>
